<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Accueil</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .card {
        height: 100%;
    }
    .card:hover {
        transform: scale(1.02);
        transition: transform 0.3s ease;
    }
    footer {
        background-color: #f8f9fa;
        padding: 20px 0;
        margin-top: 40px;
    }
  </style>
</head>
<body>
<header class="text-center my-4">
  <img src="/images/logo.png" alt="Logo de l'association" style="max-height: 100px;">
</header>

<main class="container">
  <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">


    <!-- Bloc : Ressources & documentation -->
    <div class="col">
      <div class="card border-dark">
        <div class="card-body">
          <h5 class="card-title text-dark">📚 Ressources & documentation</h5>
          <div class="accordion" id="accordionDocs">
            <div class="accordion-item">
              <h2 class="accordion-header" id="headingDocs">
                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseDocs">
                  Voir les sous-rubriques
                </button>
              </h2>
              <div id="collapseDocs" class="accordion-collapse collapse">
                <div class="accordion-body">
                  <ul>
                    <li><a href="#">📄 Documents pédagogiques</a></li>
                    <li><a href="#">📑 Rapports</a></li>
                    <li><a href="#">📰 Communiqués de presse</a></li>
                    <li><a href="#">📘 Publications</a></li>
                  </ul>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    
  </div>
</main>

<footer class="text-center">
  <div class="container">
    <p>📬 Adresse : 123 Rue de l'Association, Ville, Pays</p>
    <p>📧 Email : contact@association.org</p>
    <p>🔗 Suivez-nous : <a href="#">Facebook</a> | <a href="#">Twitter</a> | <a href="#">Instagram</a></p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
